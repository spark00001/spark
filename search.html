<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Search Bar</title>
    <!-- Importing Lucide Icons for a clean, modern search icon -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            overflow: hidden;
        }

        /* Search Container - Now Full Width with dynamic padding */
        .search-container {
            position: relative;
            width: 100%;
            padding: 0 40px; /* Adjust left & right edge distance as needed */
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 40px);
        }

        /* Glassmorphism Wrapper with Premium Glow Effect */
        .search-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 99px;
            padding: 6px 10px 6px 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            flex-shrink: 0;
            max-width: 600px; /* Keeps search bar nicely proportioned */
            width: 100%;
            margin: 0 auto;  /* Centers search bar while container spans edge-to-edge */
        }

        /* Icon Styling */
        .search-icon {
            color: rgba(255, 255, 255, 0.4);
            margin-right: 14px;
            flex-shrink: 0;
            transition: color 0.3s ease;
        }

        /* Input Field Styling */
        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: -0.2px;
            padding: 10px 0;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            transition: opacity 0.3s ease;
        }

        /* Search Button styling */
        .search-button {
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 99px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        /* Interactive Hover & Focus Effects */
        .search-wrapper:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* When the input inside the wrapper is focused */
        .search-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1), 
                        0 8px 40px rgba(255, 255, 255, 0.08);
        }

        .search-wrapper:focus-within .search-icon {
            color: rgba(255, 255, 255, 0.8);
        }

        .search-wrapper:focus-within .search-input::placeholder {
            opacity: 0.5;
        }

        .search-button:hover {
            background: #e4e4e7;
            transform: scale(1.02);
        }

        .search-button:active {
            transform: scale(0.98);
        }

        #exportsearch {
            color: white;
            width: 100%;
        }

        #notfound {
            color: transparent;
            -webkit-text-stroke: 1px gold;
            text-shadow:
                -1px -1px 0 #000,  
                 1px -1px 0 #045,
                -1px  1px 0 #086,
                 1px  1px 0 #010;
        }

        /* Gallery/Results Container spans edge-to-edge */
        .gallery {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 6px;
            margin-top: 20px;
            width: 100%;
        }

        /* Custom scrollbar */
        .gallery::-webkit-scrollbar {
            width: 6px;
        }
        .gallery::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .gallery::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .gallery::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
<link rel="stylesheet" href="https://spark00001.github.io/css/flex.css"/>
</head>
<body>

    <div class="search-container">
        <div class="search-wrapper">
            <!-- Icon element recognized by Lucide -->
            <i data-lucide="search" class="search-icon" width="20" height="20"></i>
            <input type="text" class="search-input" id="usrsearch" placeholder="Search anything...">
            <button class="search-button" onclick="searchdb()">Search</button>
        </div>
        
        <div id="gallery" class="gallery"> 
            <div id="exportsearch"></div>
        </div>
    </div>

<script src="/search.js"></script>
<script src="/adamproject.js"></script>
<script src="/searchdatabase.js"></script>
<script src="/spark/search.js"></script>
</body>
</html>
