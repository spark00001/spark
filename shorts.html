<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Feed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Prevent default page scroll, container will handle it */
        }
        /* Shorts container mimicking mobile-first vertical scroll snap */
        .shorts-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        /* Individual episode container */
        .episode-card {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps aspect ratio clean like mobile view */
        }
        /* Overlay UI Elements */
        .episode-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .action-buttons {
            position: absolute;
            right: 15px;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="shorts-container" id="feed">
        <div class="episode-card" id="ep-1" data-index="1">
            <div class="episode-badge">EP-1</div>
            <video src="video1.mp4" playsinline loop="false"></video>
            <div class="action-buttons">
                <button class="btn">ⓘ</button>
                <button class="btn">Like</button>
                <button class="btn">Chat</button>
                <button class="btn">List</button>
                <button class="btn">Share</button>
                <button class="btn next-btn">Down</button>
            </div>
        </div>

        <div class="episode-card" id="ep-2" data-index="2">
            <div class="episode-badge">EP-2</div>
            <video src="video2.mp4" playsinline loop="false"></video>
            <div class="action-buttons">
                <button class="btn">ⓘ</button>
                <button class="btn">Like</button>
                <button class="btn">Chat</button>
                <button class="btn">List</button>
                <button class="btn">Share</button>
                <button class="btn next-btn">Down</button>
            </div>
        </div>

        <div class="episode-card" id="ep-3" data-index="3">
            <div class="episode-badge">EP-3</div>
            <video src="video3.mp4" playsinline loop="false"></video>
            <div class="action-buttons">
                <button class="btn">ⓘ</button>
                <button class="btn">Like</button>
                <button class="btn">Chat</button>
                <button class="btn">List</button>
                <button class="btn">Share</button>
                <button class="btn next-btn">Down</button>
            </div>
        </div>
        
        </div>

    <script>
        const feed = document.getElementById('feed');
        const episodes = document.querySelectorAll('.episode-card');

        // --- 1. INTERSECTION OBSERVER LOGIC ---
        // Automatically plays/pauses elements dynamically as you scroll through them
        const observerOptions = {
            root: feed,
            style: null,
            threshold: 0.6 // Fires when 60% of the video card is visible
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (!video) return;

                if (entry.isIntersecting) {
                    // Modern browsers block playback with sound unless user interacted first.
                    // We attempt to play, but catch errors safely if it gets blocked.
                    video.play().catch(error => {
                        console.log("Autoplay context initialization waiting for user click.");
                    });
                } else {
                    video.pause();
                    video.currentTime = 0; // Reset video to start when scrolled away
                }
            });
        }, observerOptions);

        episodes.forEach(episode => observer.observe(episode));


        // --- 2. AUTOMATIC VIDEO CHANGING LOGIC (ON ENDED) ---
        // Listeners for when a video finishes playing entirely
        episodes.forEach((episode, index) => {
            const video = episode.querySelector('video');
            if (!video) return;

            video.addEventListener('ended', () => {
                navigateToNextEpisode(index);
            });
        });

        // --- 3. MANUAL 'DOWN' BUTTON CLICK LOGIC ---
        document.querySelectorAll('.next-btn').forEach((btn, index) => {
            btn.addEventListener('click', () => {
                navigateToNextEpisode(index);
            });
        });

        // Universal transition function
        function navigateToNextEpisode(currentIndex) {
            const nextIndex = currentIndex + 1;
            
            if (nextIndex < episodes.length) {
                const nextEpisode = episodes[nextIndex];
                
                // Smoothly scroll container to the next element element
                nextEpisode.scrollIntoView({ behavior: 'smooth' });
            } else {
                console.log("End of shorts feed reached.");
                // Optional: Loop back to EP-1 by scrolling feed to top:
                // feed.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
