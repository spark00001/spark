/* General Player Styling */
.player {

    aspect-ratio: 16 / 9;  /* Forces the correct video shape */
    border: 0;
    display: block;
    margin: 10px auto;     /* Centers it and adds top/bottom spacing */
    background-color: #000; /* Prevents white flashes while loading */
}

/* Mobile Specific Fixes */
@media screen and (max-width: 600px) {
    .movie-container {
        padding: 10px;    /* Less wasted space on edges of phone */
    }
    
    .button-container {
        display: flex;
        flex-direction: column; /* Stack buttons vertically */

        padding: 20px 10px;
    }

    .watch-button, .trailer-button {

    .poster {
        width: 120px;     /* Slightly smaller poster for small screens */
        height: auto;
    }
}
/* Target devices with a width of 768px or less (most mobiles and tablets) */
